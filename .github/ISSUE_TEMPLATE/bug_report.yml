name: 🐛 Bug Report
description: Report a bug or issue in CanIReach
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us reproduce and resolve the issue.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: E.g., The application crashed immediately on startup when SOCKS5 proxy was enabled.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Explain how we can reproduce the behavior.
      placeholder: |
        1. Open Settings -> Network Profiles.
        2. Create a SOCKS5 profile with invalid credentials.
        3. Trigger "Retest All".
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App Version / Commit Hash
      placeholder: E.g., v1.0.0-rc.1 or commit a1b2c3d
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized Application Logs
      description: |
        Paste relevant log lines from the bottom drawer stream or console logs.
        **CRITICAL WARNING: WIPE private IP addresses, SOCKS5 usernames/passwords, API tokens, and sensitive network paths BEFORE submitting.**
      placeholder: |
        [18:30:00] [google_dns]: [ERROR] Connection Timeout
  - type: checkboxes
    id: validation
    attributes:
      label: Privacy Check
      options:
        - label: I have verified that no private proxy credentials, passwords, or personal credentials are included in the logs/description.
          required: true
